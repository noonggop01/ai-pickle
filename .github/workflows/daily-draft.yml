name: Daily Draft Generation

on:
  schedule:
    # 01:00 UTC = 10:00 KST
    - cron: '0 1 * * *'
  workflow_dispatch: {}

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: daily-draft
  cancel-in-progress: false

jobs:
  generate-draft:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci

      - name: Run Agents 1-4
        run: npm run pipeline
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}

      - name: Open a review PR if a draft was generated
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          git config user.name "ai-pickle-bot"
          git config user.email "actions@users.noreply.github.com"

          git add src/content/blog public/images/blog

          if git diff --staged --quiet; then
            echo "Pipeline produced no new files — nothing to open a PR for."
            exit 0
          fi

          DATE=$(date +%Y-%m-%d)
          BRANCH="draft/${DATE}-${GITHUB_RUN_NUMBER}"
          git checkout -b "$BRANCH"
          git commit -m "Auto-generate draft for ${DATE}"
          git push origin "$BRANCH"

          gh pr create \
            --title "New draft: ${DATE}" \
            --body "Auto-generated by the daily pipeline (Agents 1-4). Review the post, fill in \`[EXPERIENCE: ...]\` placeholders, verify \`[SOURCE NEEDED]\` claims, flip \`draft: true\` to \`draft: false\`, then merge this PR to publish." \
            --base master \
            --head "$BRANCH"
