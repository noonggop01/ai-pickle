name: Daily Draft Generation

on:
  schedule:
    # 01:00 UTC = 10:00 KST
    - cron: '0 1 * * *'
  workflow_dispatch:
    inputs:
      index:
        description: 'Keyword candidate index to draft (for manual testing)'
        required: false
        default: '0'

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: daily-draft
  cancel-in-progress: false

jobs:
  generate-draft:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check for an already-open draft PR
        id: check-existing
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          EXISTING_URL=$(gh pr list --state open --json url,headRefName --jq '[.[] | select(.headRefName | startswith("draft/"))][0].url // empty')
          if [ -n "$EXISTING_URL" ]; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
            echo "url=$EXISTING_URL" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      # Only one draft PR pending review at a time — piling up a second one
      # while the first is unreviewed is exactly what caused a Telegram
      # reply meant for PR A to get misapplied to PR B (there was no
      # reliable way to tell which PR a plain-text reply was about).
      - name: Remind about the pending PR instead
        if: steps.check-existing.outputs.exists == 'true'
        run: |
          node -e "import('./scripts/lib/telegram.mjs').then(({sendMessage}) => sendMessage('아직 검토 안 된 초안이 남아있어서 오늘은 새로 안 만들었어요. 먼저 처리해주세요: ${{ steps.check-existing.outputs.url }}'))"
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}

      - uses: actions/setup-node@v4
        if: steps.check-existing.outputs.exists == 'false'
        with:
          node-version: 22
          cache: npm
      - run: npm ci
        if: steps.check-existing.outputs.exists == 'false'

      - name: Run Agents 1-4
        if: steps.check-existing.outputs.exists == 'false'
        run: npm run pipeline -- --index "${{ github.event.inputs.index || '0' }}"
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}

      - name: Open a review PR if a draft was generated
        id: open-pr
        if: steps.check-existing.outputs.exists == 'false'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          git config user.name "ai-pickle-bot"
          git config user.email "actions@users.noreply.github.com"

          git add src/content/blog public/images/blog

          if git diff --staged --quiet; then
            echo "Pipeline produced no new files — nothing to open a PR for."
            echo "created=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          SLUG=$(git diff --staged --name-only -- 'src/content/blog/*.md' | head -n1 | xargs -n1 basename | sed 's/\.md$//')

          DATE=$(date +%Y-%m-%d)
          BRANCH="draft/${DATE}-${GITHUB_RUN_NUMBER}"
          git checkout -b "$BRANCH"
          git commit -m "Auto-generate draft for ${DATE}"
          git push origin "$BRANCH"

          PR_URL=$(gh pr create \
            --title "New draft: ${DATE}" \
            --body "Auto-generated by the daily pipeline (Agents 1-4). Review the post, fill in \`[EXPERIENCE: ...]\` placeholders, verify \`[SOURCE NEEDED]\` claims, then tap Approve in Telegram (or flip \`draft: true\` to \`draft: false\` and merge manually)." \
            --base master \
            --head "$BRANCH")

          PR_NUMBER=$(echo "$PR_URL" | grep -o '[0-9]*$')

          echo "created=true" >> "$GITHUB_OUTPUT"
          echo "slug=$SLUG" >> "$GITHUB_OUTPUT"
          echo "pr_number=$PR_NUMBER" >> "$GITHUB_OUTPUT"
          echo "pr_url=$PR_URL" >> "$GITHUB_OUTPUT"

      - name: Notify Telegram
        if: steps.open-pr.outputs.created == 'true'
        run: |
          node scripts/notify-telegram.mjs \
            --slug "${{ steps.open-pr.outputs.slug }}" \
            --pr "${{ steps.open-pr.outputs.pr_number }}" \
            --pr-url "${{ steps.open-pr.outputs.pr_url }}"
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
